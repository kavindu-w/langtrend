name: LangTrend Snapshot

on:
  # Every Tuesday at 12:00 UTC — arXiv's Mon 20:00 ET announcement (covering
  # Fri–Mon submissions) completes ~Tue 00:00 UTC; noon gives the API time to
  # fully index before we harvest via OAI-PMH.
  schedule:
    - cron: '0 12 * * 2'
  # Also trigger on manual dispatch and on pushes to main for code changes
  workflow_dispatch:
    inputs:
      publish_site:
        description: 'Deploy to GitHub Pages after building'
        required: false
        default: false
        type: boolean
      major_version_update:
        description: 'Use a major version bump instead of a patch bump'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - 'langtrend/**'
      - 'scripts/**'
      - 'web/**'
      - 'web/package-lock.json'
      - 'requirements.txt'
      - '.python-version'
      - '.github/workflows/langtrend.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 1 + 2 + 3: fetch → process → manifest
      # Skip logic is handled inside the script: if the JSONL / detected JSONL
      # already exists for this week's window it won't re-fetch or re-process.
      - name: Run LangTrend pipeline
        run: |
          python scripts/run_langtrend_pipeline.py \
            --data-root data \
            --window-days 7 \
            --max-results 1000 \
            --workers 4 

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Bump product version
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        run: |
          current_version=$(tr -d '[:space:]' < VERSION)
          major=${current_version%%.*}
          minor_patch=${current_version#*.}
          minor=${minor_patch%%.*}
          patch=${current_version##*.}

          if [[ -z "$major" || -z "$minor" || -z "$patch" ]]; then
            echo "VERSION must use semantic versioning like 0.1.0"
            exit 1
          fi

          patch=$((patch + 1))
          new_version="$major.$minor.$patch"

          printf '%s\n' "$new_version" > VERSION

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Bump version to $new_version"
          git push origin HEAD:main

      - name: Bump product version (major)
        if: github.event_name == 'workflow_dispatch' && inputs.publish_site && inputs.major_version_update
        run: |
          current_version=$(tr -d '[:space:]' < VERSION)
          major=${current_version%%.*}
          minor_patch=${current_version#*.}
          minor=${minor_patch%%.*}
          patch=${current_version##*.}

          if [[ -z "$major" || -z "$minor" || -z "$patch" ]]; then
            echo "VERSION must use semantic versioning like 0.1.0"
            exit 1
          fi

          major=$((major + 1))
          new_version="$major.0.0"

          printf '%s\n' "$new_version" > VERSION

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Bump version to $new_version"
          git push origin HEAD:main

      - name: Commit generated week outputs
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          shopt -s nullglob
          generated_files=(
            data/raw/extracted_papers_metadata/arxiv_papers_*_to_*.jsonl
            data/processed/language_screening_warnings.json
            data/processed/langtrend_manifest_last_7_days.json
            data/processed/weeks/*/arxiv_papers_*_detected.jsonl
            data/processed/weeks/*/arxiv_papers_*_no_detections.json
            data/processed/weeks/*/arxiv_papers_*_warnings.json
            data/processed/weeks/*/langtrend_manifest.json
          )

          if [ ${#generated_files[@]} -eq 0 ]; then
            echo "No generated files matched any pattern."
            exit 0
          fi

          git add -f "${generated_files[@]}"

          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
            exit 0
          fi

          git commit -m "Update processed weekly outputs"
          git push origin HEAD:main

      - name: Configure Pages
        if: github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_site)
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deploy
        if: github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_site)
        uses: actions/deploy-pages@v4

      - name: Upload snapshot artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: langtrend-snapshot-${{ github.run_id }}
          path: |
            data/processed/langtrend_manifest_last_7_days.json
            data/processed/langtrend_manifest_*_to_*.json
          retention-days: 30

