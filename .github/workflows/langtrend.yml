name: LangTrend Snapshot

on:
  # Every Monday at 03:15 UTC — after the previous week closes at midnight
  schedule:
    - cron: '15 3 * * 1'
  # Also trigger on manual dispatch and on pushes to main for code changes
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'langtrend/**'
      - 'scripts/**'
      - 'web/**'
      - 'web/package-lock.json'
      - 'requirements.txt'
      - '.python-version'
      - '.github/workflows/langtrend.yml'

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment; cancel in-flight runs on the same branch
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 1 + 2 + 3: fetch → process → manifest
      # Skip logic is handled inside the script: if the JSONL / detected JSONL
      # already exists for this week's window it won't re-fetch or re-process.
      - name: Run LangTrend pipeline
        run: |
          python scripts/run_langtrend_pipeline.py \
            --data-root data \
            --window-days 7 \
            --max-results 1000 \
            --workers 4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Upload snapshot artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: langtrend-snapshot-${{ github.run_id }}
          path: |
            data/processed/langtrend_manifest_last_7_days.json
            data/processed/langtrend_manifest_*_to_*.json
          retention-days: 30

  deploy:
    needs: pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
