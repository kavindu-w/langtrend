name: LangTrend Snapshot

on:
  workflow_dispatch:
  # schedule:
    # - cron: '15 3 * * 1'
  push:
    branches:
      - main
      # - development
    paths:
      - 'langtrend/**'
      - 'scripts/**'
      - 'web/**'
      - 'web/package-lock.json'
      - 'requirements.txt'
      - '.python-version'
      - '.github/workflows/langtrend.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate LangTrend snapshot
        run: |
          python scripts/run_langtrend_pipeline.py --data-root data --window-days 7 --max-results 100

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: langtrend-site
          path: web/dist
          retention-days: 14

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: langtrend-snapshot
          path: |
            data/processed/langtrend_manifest_last_7_days.json
            data/processed/papers_with_tracked_langs_last_7_days.jsonl
            data/raw/arxiv_papers_last_7_days.jsonl
          retention-days: 14
